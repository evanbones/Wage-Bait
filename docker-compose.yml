services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json
          target: /app/package.json
        - action: rebuild
          path: ./frontend/vite.config.ts
          target: /app/vite.config.ts

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
    volumes:
      # This ensures your users.json saves locally and persists!
      - ./backend/data:/app/data 
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules/
            - data/
        - action: rebuild
          path: ./backend/package.json
          target: /app/package.json